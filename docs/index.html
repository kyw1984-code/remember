<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>외워줘 — 스마트 플래시카드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #111827; }
    .hero { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); color: #fff; text-align: center; padding: 80px 24px; }
    .hero h1 { font-size: 40px; font-weight: 800; margin-bottom: 12px; }
    .hero p { font-size: 18px; opacity: 0.85; max-width: 480px; margin: 0 auto 32px; line-height: 1.6; }
    .badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .badge-link { display: inline-block; background: #fff; color: #4F46E5; font-size: 15px; font-weight: 700; padding: 12px 28px; border-radius: 12px; text-decoration: none; }
    .badge-link:hover { opacity: 0.9; }
    .features { max-width: 720px; margin: 60px auto; padding: 0 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; }
    .feature { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .feature-icon { font-size: 32px; margin-bottom: 12px; }
    .feature h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .feature p { font-size: 14px; color: #6B7280; line-height: 1.6; }
    footer { text-align: center; padding: 40px 24px; font-size: 14px; color: #9CA3AF; border-top: 1px solid #E5E7EB; }
    footer a { color: #4F46E5; text-decoration: none; margin: 0 8px; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>외워줘 🃏</h1>
    <p>간격 반복 알고리즘으로 더 적게 공부하고 더 오래 기억하세요</p>
    <div class="badges">
      <a class="badge-link" href="#">App Store</a>
      <a class="badge-link" href="#">Google Play</a>
    </div>
  </div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🧠</div>
      <h3>간격 반복</h3>
      <p>SM-2 알고리즘으로 최적의 복습 시점을 자동 계산합니다</p>
    </div>
    <div class="feature">
      <div class="feature-icon">📊</div>
      <h3>오답 노트</h3>
      <p>틀린 카드만 모아 집중 복습할 수 있습니다</p>
    </div>
    <div class="feature">
      <div class="feature-icon">🌙</div>
      <h3>다크 모드</h3>
      <p>시스템 설정에 따라 자동으로 전환됩니다</p>
    </div>
    <div class="feature">
      <div class="feature-icon">📚</div>
      <h3>프리셋 세트</h3>
      <p>수능 영어, TOEIC, 한국사 등 바로 시작 가능합니다</p>
    </div>
  </div>

  <footer>
    © 2026 외워줘. All rights reserved.
    <br />

    <a href="terms.html">이용약관</a>
    <a href="mailto:kyw1984@gmail.com">문의</a>
  </footer>
</body>
</html>
